name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Build (non-Windows)
        if: runner.os != 'Windows'
        run: go build -o conductor-${{ runner.os }} ./cm./ariadne
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: go build -o conductor-${{ runner.os }}.exe ./cm./ariadne
      - name: Upload artifact (non-Windows)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: conductor-${{ runner.os }}
          path: conductor-${{ runner.os }}
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: conductor-${{ runner.os }}
          path: conductor-${{ runner.os }}.exe
